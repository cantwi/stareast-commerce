name: API tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start API (background)
        env:
          JWT_SECRET: ci-secret
          PORT: 3000
        run: |
          nohup npm start > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for healthcheck
        run: |
          for i in {1..60}; do
            if curl -fsS "http://localhost:3000/healthcheck" | grep -q '"status":"ok"'; then
              echo "API is healthy."
              exit 0
            fi
            sleep 1
          done

          echo "API did not become healthy in time. Dumping logs:"
          cat api.log || true
          exit 1

      - name: Run tests
        env:
          JWT_SECRET: ci-secret
          PORT: 3000
        run: npm test

      - name: Dump API logs on failure
        if: failure()
        run: cat api.log || true
